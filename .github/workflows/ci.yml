name: ci

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      influxdb:
        image: influxdb:2.9
        ports:
          - 8086:8086
        options: --entrypoint influxd
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Download modules
        run: go mod download

      - name: Wait for InfluxDB
        run: |
          for i in $(seq 1 30); do
            if curl --fail --silent http://localhost:8086/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "InfluxDB did not become ready in time" >&2
          exit 1

      - name: Set up InfluxDB
        run: |
          docker exec "${{ job.services.influxdb.id }}" influx setup \
            --force \
            --username ci \
            --password ci-password-123 \
            --org ci-org \
            --bucket ci-bucket \
            --token ci-token

      - name: Run tests
        env:
          INTEGRATION_INFLUX_URL: http://localhost:8086
          INTEGRATION_INFLUX_TOKEN: ci-token
          INTEGRATION_INFLUX_ORG: ci-org
          INTEGRATION_INFLUX_BUCKET: ci-bucket
        run: go test ./...

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    runs-on: ubuntu-latest
    needs:
      - test
      - docker
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            GOOS=linux GOARCH="$arch" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w" \
              -o "dist/strominfo-influx_${VERSION}_linux_${arch}" \
              ./cmd/strominfo-influx
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh release create "$VERSION" dist/* \
            --repo "$REPOSITORY" \
            --title "$VERSION" \
            --generate-notes \
            --notes "Container image: ghcr.io/$REPOSITORY:$VERSION"
